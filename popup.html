<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --paper: #faf7f1;
      --paper-deep: #f1ece1;
      --ink: #1c1a17;
      --ink-soft: #6b6459;
      --line: #ded7c9;
      --accent: #1e3f8f;        /* fountain-pen blue */
      --accent-deep: #16306e;
      --ok: #2f6b3a;
      --err: #a3372a;
      --serif: "Iowan Old Style", "Palatino", "Palatino Linotype", Georgia, serif;
      --sans: "Avenir Next", "Avenir", "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      width: 420px; margin: 0; padding: 0;
      background:
        radial-gradient(circle at 85% -20%, rgba(30,63,143,.07), transparent 55%),
        var(--paper);
      color: var(--ink);
      font: 13px/1.5 var(--sans);
    }

    /* ---------- header (wordmark + compact mode switch) ---------- */
    header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--line);
    }
    .wordmark { font: italic 600 16px/1 var(--serif); letter-spacing: .01em; }
    .wordmark::after { content: "."; color: var(--accent); }
    header a {
      font-size: 11px; color: var(--ink-soft); text-decoration: none;
      border-bottom: 1px dotted var(--line);
    }
    header a:hover { color: var(--accent); border-color: var(--accent); }
    #clearDraft { margin-left: auto; margin-right: 10px; }

    main { padding: 12px 16px 14px; }

    /* ---------- compact mode switch ---------- */
    .tabs {
      position: relative; display: grid; grid-template-columns: 1fr 1fr;
      width: 148px; flex: none;
      background: var(--paper-deep); border: 1px solid var(--line);
      border-radius: 999px; padding: 2px;
    }
    .tabs .thumb {
      position: absolute; top: 2px; bottom: 2px; left: 2px;
      width: calc(50% - 2px);
      background: var(--ink); border-radius: 999px;
      transition: transform .22s cubic-bezier(.5,0,.2,1);
    }
    .tabs[data-active="ask"] .thumb { transform: translateX(100%); }
    .tabs button {
      position: relative; z-index: 1;
      border: none; background: none; cursor: pointer;
      padding: 4px 0; border-radius: 999px;
      font: 600 11px var(--sans); letter-spacing: .02em;
      color: var(--ink-soft); transition: color .22s;
    }
    .tabs button.active { color: var(--paper); }

    /* ---------- fields ---------- */
    label.field {
      display: block; margin: 0 0 5px;
      font: 700 10.5px var(--sans); letter-spacing: .12em; text-transform: uppercase;
      color: var(--ink-soft);
    }
    label.field em { text-transform: none; letter-spacing: 0; font: italic 11px var(--serif); color: var(--ink-soft); }
    textarea {
      width: 100%; padding: 9px 11px; resize: vertical;
      background: #fffdf9; color: var(--ink);
      border: 1px solid var(--line); border-radius: 10px;
      font: 13px/1.5 var(--sans);
      transition: border-color .15s, box-shadow .15s;
    }
    textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(30,63,143,.12); }
    textarea::placeholder { color: #a89f90; }

    /* ---------- polish pane ---------- */
    .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
    .actions button {
      padding: 8px 0 7px; cursor: pointer;
      background: #fffdf9; border: 1px solid var(--line); border-radius: 10px;
      font: 600 12px var(--sans); color: var(--ink);
      transition: border-color .15s, background .15s, transform .06s;
    }
    .actions button:hover { border-color: var(--ink); background: var(--paper-deep); }
    .actions button:active { transform: translateY(1px); }
    .actions button .sub { display: block; font: italic 10.5px var(--serif); color: var(--ink-soft); }

    /* ---------- ask pane ---------- */
    .pane { display: none; }
    .pane.active { display: block; animation: rise .18s ease-out; }
    @keyframes rise { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    #ctxToggle {
      display: inline-flex; align-items: center; gap: 6px;
      margin: 10px 0 0; padding: 0; border: none; background: none; cursor: pointer;
      font: italic 12px var(--serif); color: var(--accent);
    }
    #ctxToggle::before { content: "+"; font: 700 13px var(--sans); transition: transform .2s; }
    #ctxToggle.open::before { content: "–"; }
    #ctxWrap { display: none; margin-top: 8px; }
    #ctxWrap.open { display: block; animation: rise .18s ease-out; }
    #context { border-style: dashed; background: var(--paper-deep); }

    .generate {
      width: 100%; margin-top: 12px; padding: 10px 0; cursor: pointer;
      background: var(--accent); color: var(--paper);
      border: none; border-radius: 10px;
      font: 600 13px var(--sans); letter-spacing: .03em;
      transition: background .15s, transform .06s;
    }
    .generate:hover { background: var(--accent-deep); }
    .generate:active { transform: translateY(1px); }
    .generate:disabled { opacity: .6; cursor: default; }

    /* ---------- result ---------- */
    #resultCard { display: none; margin-top: 14px; animation: rise .2s ease-out; }
    #resultCard .head {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;
    }
    #result {
      white-space: pre-wrap;
      background: #fffdf9; border: 1px solid var(--line); border-left: 3px solid var(--accent);
      border-radius: 0 10px 10px 0; padding: 10px 12px;
      font: 13px/1.55 var(--serif);
    }
    #resultCard.error #result { border-left-color: var(--err); color: var(--err); font-family: var(--sans); }
    #resultCard.busy #result { color: var(--ink-soft); font-style: italic; }
    #copy {
      padding: 3px 12px; cursor: pointer;
      background: none; border: 1px solid var(--line); border-radius: 999px;
      font: 600 11px var(--sans); color: var(--ink);
      transition: border-color .15s, color .15s;
    }
    #copy:hover { border-color: var(--ok); color: var(--ok); }

    footer {
      padding: 8px 16px 12px; font: italic 11px var(--serif); color: var(--ink-soft);
    }
    #pageStatus { margin-bottom: 3px; font: 10.5px var(--sans); }
    #pageStatus.ok { color: var(--ok); }
    #pageStatus.warn { color: var(--err); }
  </style>
</head>
<body>
  <header>
    <span class="wordmark">English Polisher</span>
    <div class="tabs" data-active="polish" id="tabs">
      <div class="thumb"></div>
      <button id="tabPolish" class="active">Polish</button>
      <button id="tabAsk">Ask</button>
    </div>
    <a href="#" id="clearDraft" title="Clear all fields">clear</a>
    <a href="#" id="openOptions">settings</a>
  </header>

  <main>
    <!-- POLISH: one box, three actions -->
    <section class="pane active" id="panePolish">
      <label class="field" for="input">Your text</label>
      <textarea id="input" rows="6" placeholder="Paste the text you want cleaned up…"></textarea>
      <div class="actions">
        <button data-mode="fix">Fix<span class="sub">grammar</span></button>
        <button data-mode="humanize">Humanize<span class="sub">natural tone</span></button>
        <button data-mode="shorten">Shorten<span class="sub">tighter</span></button>
      </div>
    </section>

    <!-- ASK: instruction first, context clearly optional & separate -->
    <section class="pane" id="paneAsk">
      <label class="field" for="instruction">What should I write?</label>
      <textarea id="instruction" rows="3" placeholder='e.g. "Reply to this email — interested, but ask about pricing"'></textarea>

      <button id="ctxToggle">add context <em>(the email you're replying to, notes…)</em></button>
      <div id="ctxWrap">
        <label class="field" for="context">Context <em>— optional, used as reference</em></label>
        <textarea id="context" rows="5" placeholder="Paste the email / text to base the writing on…"></textarea>
      </div>

      <button class="generate" id="gen">Generate ⌘⏎</button>
    </section>

    <div id="resultCard">
      <div class="head">
        <label class="field" style="margin:0">Result</label>
        <button id="copy">Copy</button>
      </div>
      <div id="result"></div>
    </div>
  </main>

  <footer>
    <div id="pageStatus"></div>
    <div>Tip: select text in a field, then press Alt+Shift+F to fix it in place.
      <a href="#" id="diag" style="color:inherit">diagnose</a></div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
